name: Build & Auto-Release plc-api (Linux)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ./plc-api.csproj

      - name: Build
        run: dotnet build ./plc-api.csproj --configuration Release --no-restore

      - name: Publish (linux-x64, framework-dependent)
        run: |
          dotnet publish ./plc-api.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output ./publish/linux-x64

      - name: Create ZIP package
        run: |
          mkdir -p publish
          cd publish
          zip -r plc-api-linux-x64.zip linux-x64

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: plc-api-linux-x64-${{ github.sha }}
          path: publish/plc-api-linux-x64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: plc-api-linux-x64-${{ github.sha }}
          path: ./

      - name: Extract version from appsettings.json
        id: get_version
        run: |
          VERSION=$(jq -r '.PlcApi.Version' appsettings.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Version not found in appsettings.json at PlcApi.Version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$TAG" \
            "plc-api-linux-x64.zip" \
            --title "plc-api $TAG" \
            --notes "Automated Linux build from GitHub Actions."
